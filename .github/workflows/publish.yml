name: Publish to npm

on:
  push:
    branches:
      - main

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Read package version
        id: pkg
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if version is already published
        id: check
        run: |
          if npm view ovcs@${{ steps.pkg.outputs.version }} version 2>/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.pkg.outputs.version }} already exists on npm"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.pkg.outputs.version }} not yet published"
          fi

      - name: Create git tag
        if: steps.check.outputs.published == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="${{ steps.pkg.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping tag creation"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Publish to npm with provenance
        if: steps.check.outputs.published == 'false'
        run: npm publish --provenance --access public
